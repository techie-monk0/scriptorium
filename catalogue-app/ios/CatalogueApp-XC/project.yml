# XcodeGen spec for the runnable catalogue-app bundle. Generate the .xcodeproj with:
#     cd catalogue-app/ios/CatalogueApp-XC && xcodegen generate && open CatalogueApp.xcodeproj
# The app target is a thin shell: it depends on the local SwiftPM package (CatalogueUI product),
# which transitively pulls octavo-swift + postilla-swift via their path dependencies.
name: CatalogueApp
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  CatalogueApp:
    path: ../CatalogueApp-Pkg     # the SwiftPM package (CatalogueUI/Core/Data/Reader/Design)

targets:
  CatalogueApp:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: CatalogueApp
        product: CatalogueUI
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Scriptorium Reader
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # The library server is plain HTTP on the LAN → allow local networking (not arbitrary loads).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: "Connect to your catalogue server on the local network."
    configFiles:
      Debug: Config/App.xcconfig
      Release: Config/App.xcconfig
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"      # iPhone + iPad
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        # For a physical device, set your signing team here (or in Xcode → Signing & Capabilities):
        # DEVELOPMENT_TEAM: ABCDE12345
        # CODE_SIGN_STYLE: Automatic
