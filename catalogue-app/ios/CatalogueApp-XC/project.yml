# XcodeGen spec for the runnable catalogue-app bundle. Generate the .xcodeproj with:
#     cd catalogue-app/ios/CatalogueApp-XC && xcodegen generate && open CatalogueApp.xcodeproj
# The app target is a thin shell: it depends on the local SwiftPM package (CatalogueUI product),
# which transitively pulls octavo-swift + postilla-swift via their path dependencies.
name: CatalogueApp
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  CatalogueApp:
    path: ../CatalogueApp-Pkg     # the SwiftPM package (CatalogueUI/Core/Data/Reader/Design)

targets:
  CatalogueApp:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: CatalogueApp
        product: CatalogueUI
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Scriptorium Reader
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # The library server is plain HTTP. ATS exemptions, narrowest that work:
        #  - NSAllowsLocalNetworking: true → RFC1918 LAN (192.168/10/172.16), .local, loopback.
        #  - NSExceptionDomains ts.net    → the Tailscale tailnet (MagicDNS). Tailscale hands out
        #    100.64.0.0/10 (CGNAT) addresses, which ATS does NOT treat as local, so plain HTTP to a
        #    tailnet host needs its own exception. WireGuard already encrypts the tailnet, so cleartext
        #    on top is safe. Reach the server by its MagicDNS name (…​.ts.net), not the raw 100.x IP —
        #    ATS exception domains match DNS names, not IP literals.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            ts.net:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
        NSLocalNetworkUsageDescription: "Connect to your catalogue server on the local network."
        # Built-in default server address (empty in public builds → app falls back to loopback).
        # Expanded at build time from CATALOGUE_DEFAULT_SERVER (git-ignored App.local.xcconfig,
        # mirroring `private/local_defaults.json`). Read by AppModel.defaultEndpoint.
        CatalogueDefaultServer: $(CATALOGUE_DEFAULT_SERVER)
    configFiles:
      Debug: Config/App.xcconfig
      Release: Config/App.xcconfig
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"      # iPhone + iPad
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        # For a physical device, set your signing team here (or in Xcode → Signing & Capabilities):
        # DEVELOPMENT_TEAM: ABCDE12345
        # CODE_SIGN_STYLE: Automatic
